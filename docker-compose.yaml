services:
  wahy-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-wahy-frontend}:latest
    container_name: ${COMPOSE_PROJECT_NAME:-wahy-frontend}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}
      - PORT=3000
    restart: unless-stopped
    networks:
      - wahy-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  wahy-network:
    driver: bridge